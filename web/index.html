<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classroom 50</title>
    <script>
      // Anti-flash: apply the persisted (or OS-preferred) theme before the app
      // renders so there's no light->dark flicker. Mirrors resolveInitialTheme
      // in src/hooks/useTheme.ts.
      ;(function () {
        try {
          var stored = localStorage.getItem("classroom50:theme")
          var theme =
            stored === "corporate" || stored === "corporate-dark"
              ? stored
              : window.matchMedia &&
                  window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "corporate-dark"
                : "corporate"
          document.documentElement.setAttribute("data-theme", theme)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
