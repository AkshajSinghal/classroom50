name: web Deploy to GitHub Pages

# Manual redeploy of the web app (web/) to classroom50.org via GitHub Pages.
#
# Production RELEASES are handled by web-release-please.yaml: merging the
# release-please Release PR tags `web-vX.Y.Z` and that workflow builds + deploys
# the tagged commit. This workflow is kept as a manual escape hatch only
# (workflow_dispatch) to re-publish a chosen ref without cutting a release —
# e.g. to recover a broken Pages deploy or redeploy an existing tag.
#
# classroom50.org is this repo's Pages custom domain (Settings -> Pages, source:
# GitHub Actions). web/CNAME carries the domain into the published artifact; the
# Vite build serves from root "/" (default base), correct for classroom50.org.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (tag/branch/SHA) to build and deploy. Defaults to the run ref.'
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
        with:
          # Build the ref the operator chose (a tag to redeploy a release, or a
          # branch/SHA); empty falls back to the ref the run was dispatched on.
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      # Run the test suite (incl. skeleton.test.ts) before building: vite build
      # does not fail when the skeleton glob matches fewer files, so only the
      # parity test / buildSkeletonFiles throw detects a drifted bundle. Gating
      # the deploy on it keeps a broken skeleton from shipping even if web-ci
      # was skipped (the deploy is path-scoped to web/**, same as web-ci).
      - run: npm test

      # `npm run build` runs `tsc -b && vite build`; the type-check is
      # blocking, so a regression fails the deploy instead of silently
      # shipping. Served from the root of the custom domain (classroom50.org),
      # so the default base of "/" is correct.
      - run: npm run build
        env:
          # OAuth client IDs are public identifiers, so a repo variable
          # (Settings -> Secrets and variables -> Actions -> Variables)
          # is sufficient; no secret needed.
          VITE_GITHUB_CLIENT_ID: ${{ vars.VITE_GITHUB_CLIENT_ID }}
          # Release identity stamped into the build (see web/vite.config.ts).
          # A `web-v*` ref names the version; anything else (branch/SHA redeploy)
          # falls back to web/package.json. Commit + date give a precise build
          # fingerprint for bug reports.
          VITE_APP_VERSION: ${{ startsWith(inputs.ref, 'web-v') && inputs.ref || '' }}
          VITE_APP_COMMIT: ${{ github.sha }}

      # GitHub Pages has no SPA rewrites; serve the app for unknown deep links.
      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      # The Actions Pages deploy publishes only the dist/ artifact, so the
      # custom domain must be written into dist/ (web/CNAME is at the web root,
      # which Vite does not copy — only web/public/ is copied). Source it from
      # web/CNAME so the domain has a single source of truth.
      - name: Write CNAME into dist
        run: cp CNAME dist/CNAME

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          # Path is repo-root-relative, not affected by working-directory.
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
