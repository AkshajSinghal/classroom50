name: Mirror to public repo

# Syncs the development repo to foundation50/classroom50 on every
# push to `v1`. This workflow file is excluded from the sync itself
# (see the rsync `--exclude` list below), so it stays dev-only and
# this comment block is the right place to document setup.
#
# What gets synced:
#   - Tracked files are pushed to the public repo's `main` branch.
#     The exclude list drops `wiki/`, this workflow file, and the
#     dev-only `plans/` notes.
#   - `wiki/` is pushed to two wiki repos — one commit per sync,
#     replacing the previous wiki contents on each:
#       * `foundation50/classroom50.wiki.git`   (public)
#       * `foundation50/classroom50-cli.wiki.git` (internal preview)
#     The dev wiki lets the team review rendered pages on this repo
#     before they propagate to the public one.
#
# Both targets are downstream-only: direct edits there (including
# wiki edits via the GitHub UI) are overwritten on the next sync.
#
# Reconcile guard: to avoid silently destroying direct wiki edits,
# the wiki sync step inspects each target's commit history. If a
# downstream wiki has any commit NOT authored by the sync bot and
# its content differs from this repo's wiki/, the workflow FAILS
# instead of overwriting. A human must pull those edits back into
# wiki/ (open a PR to v1); once wiki/ matches, the guard passes and
# the sync resumes. This keeps the "source of truth lives in wiki/"
# invariant while ensuring no upstream edit is lost.
#
# One-time setup:
#   1. Create a PAT with `contents: write` on
#      `foundation50/classroom50`. Fine-grained PATs also need
#      `wiki` access; classic PATs need the `repo` scope.
#   2. Add it as repo secret `MIRROR_PAT` at
#      Settings → Secrets and variables → Actions.
#   3. Enable the wiki and create at least one page via the GitHub
#      UI on BOTH `foundation50/classroom50` and
#      `foundation50/classroom50-cli` (Settings → Features → Wikis).
#      GitHub doesn't initialize the wiki repo until the first page
#      exists, and the wiki sync step will fail until then.
#
# The dev wiki is pushed with the built-in GITHUB_TOKEN, so no extra
# secret is needed for it — only the workflow's `contents: write`
# permission below.
#
# Every merge to `v1` then runs the mirror automatically. Manual
# runs are available from the Actions tab via workflow_dispatch.

on:
  push:
    branches: [v1]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mirror-to-public
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TARGET_REPO: foundation50/classroom50
      TARGET_BRANCH: main
      SOURCE_REPO: ${{ github.repository }}
      SOURCE_SHA: ${{ github.sha }}
      SYNC_TOKEN: ${{ secrets.MIRROR_PAT }}
    steps:
      - name: Check token
        run: |
          if [ -z "${SYNC_TOKEN:-}" ]; then
            echo "::error::MIRROR_PAT secret is missing. Create a PAT with contents+wiki write access on ${TARGET_REPO} and add it as repository secret MIRROR_PAT."
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: Configure git identity
        run: |
          git config --global user.name "classroom50-sync[bot]"
          git config --global user.email "classroom50-sync@users.noreply.github.com"

      - name: Mirror repo content
        run: |
          set -euo pipefail
          work=$(mktemp -d)
          cd "$work"

          remote="https://x-access-token:${SYNC_TOKEN}@github.com/${TARGET_REPO}.git"
          if git clone --quiet "$remote" target; then
            cd target
          else
            mkdir target
            cd target
            git init -q -b "$TARGET_BRANCH"
            git remote add origin "$remote"
          fi

          # Make sure we're on the target branch, even if the remote's default differs
          # or the repo was empty (no HEAD yet).
          if git rev-parse --verify HEAD >/dev/null 2>&1; then
            git checkout -B "$TARGET_BRANCH"
          else
            git checkout -b "$TARGET_BRANCH"
          fi

          # Wipe tracked content (preserve .git), then copy current source tree in.
          # Excluded paths:
          #   - wiki/ goes to the wiki repo in the next step.
          #   - This workflow file stays dev-only so the public repo doesn't try to run it.
          #   - cli-release.yaml is dev-only release tooling: it references the
          #     private target repos (foundation50/gh-teacher|gh-student) and the
          #     CLI_RELEASE_PAT secret, so the public mono-mirror shouldn't carry it.
          #   - web-*.yaml workflows operate on the (private) web/ tree; exclude
          #     them too so the public repo doesn't carry workflows referencing a
          #     directory it doesn't have.
          #   - plans/ holds internal planning notes that reference dev-only resources
          #     (e.g. PR URLs against this repo); keep them out of the public mirror.
          #   - AGENTS.md / CONCEPTS.md are internal contributor/agent guidance: they
          #     describe the monorepo's internal layout, conventions, and decision
          #     making and reference dev-only/web-private docs, so they stay out of
          #     the public mirror. The basename excludes drop every AGENTS.md at any
          #     depth (root + cli/*); web/AGENTS.md is already covered by web/.
          #   - web/ (the web frontend) is kept PRIVATE for now: the source is not
          #     mirrored to the public repo yet, even though the built site is
          #     deployed to classroom50.org from this repo (web-deploy.yaml). Drop
          #     this exclude when the web source is ready to open-source.
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          rsync -a \
            --exclude='.git/' \
            --exclude='wiki/' \
            --exclude='.github/workflows/mirror-to-public.yaml' \
            --exclude='.github/workflows/cli-release.yaml' \
            --exclude='.github/workflows/web-ci.yaml' \
            --exclude='.github/workflows/web-deploy.yaml' \
            --exclude='.github/workflows/web-deploy-staging.yaml' \
            --exclude='plans/' \
            --exclude='AGENTS.md' \
            --exclude='CONCEPTS.md' \
            --exclude='web/' \
            "$GITHUB_WORKSPACE"/ ./

          if [ -z "$(git status --porcelain)" ]; then
            echo "Repo already up to date."
          else
            git add -A
            short=$(printf '%s' "$SOURCE_SHA" | cut -c1-7)
            git commit -q \
              -m "Sync from ${SOURCE_REPO}@${short}" \
              -m "Source: https://github.com/${SOURCE_REPO}/commit/${SOURCE_SHA}"
            git push origin "$TARGET_BRANCH"
          fi

      - name: Mirror wiki content
        env:
          DEV_TOKEN: ${{ github.token }}
          # Identity that the sync bot commits under (see "Configure git
          # identity" above). Any downstream wiki commit NOT authored by
          # this identity is treated as an unreconciled upstream edit.
          SYNC_BOT_EMAIL: classroom50-sync@users.noreply.github.com
        run: |
          set -euo pipefail
          src="$GITHUB_WORKSPACE/wiki"
          if [ ! -d "$src" ] || [ -z "$(ls -A "$src" 2>/dev/null)" ]; then
            echo "No wiki/ content; skipping wiki sync."
            exit 0
          fi

          short=$(printf '%s' "$SOURCE_SHA" | cut -c1-7)

          # Push the same wiki/ contents to each target. The public
          # repo uses the MIRROR_PAT; the dev repo uses the built-in
          # GITHUB_TOKEN (workflow `contents: write` covers same-repo
          # wiki pushes).
          #
          # Reconcile guard: the wikis are meant to be downstream-only,
          # but people sometimes edit them directly (e.g. via the GitHub
          # UI or by pushing to the .wiki.git remote). Blindly syncing
          # would silently overwrite that work. So before pushing we
          # check whether the downstream wiki carries any commit that the
          # sync bot did not author. If it does AND its current content
          # differs from the source wiki/, we fail and require a human to
          # pull those edits back into wiki/ on this repo first. Once the
          # source wiki/ matches (content reconciled), the guard passes
          # and the sync proceeds normally.
          sync_wiki() {
            local target="$1" token="$2"
            echo "::group::Syncing wiki to ${target}"
            local work
            work=$(mktemp -d)
            cd "$work"
            local remote="https://x-access-token:${token}@github.com/${target}.wiki.git"
            if ! git clone --quiet "$remote" wiki; then
              echo "::error::Could not clone ${target}.wiki.git. Enable the wiki on ${target} and create at least one page (e.g. Home) via the GitHub UI to initialize the wiki repo, then re-run this workflow."
              return 1
            fi

            cd wiki

            # Detect unreconciled upstream edits: a commit not authored by
            # the sync bot means someone changed the downstream wiki
            # directly (e.g. via the GitHub UI or a direct push).
            #
            # We only care about foreign commits made AFTER our most recent
            # sync. Rationale:
            #   - Before the first sync the wiki must be bootstrapped with a
            #     page via the GitHub UI (see setup notes above); that
            #     initial commit is "foreign" but is meant to be overwritten,
            #     so it must not block the first sync.
            #   - After we've synced at least once, the latest sync commit is
            #     our known-good baseline; anything foreign on top of it is a
            #     genuine direct edit that would be lost.
            local last_sync foreign_commits foreign_range
            last_sync=$(git log -1 --format='%H' --author="${SYNC_BOT_EMAIL}" 2>/dev/null || true)
            if [ -n "$last_sync" ]; then
              foreign_range="${last_sync}..HEAD"
            else
              # No sync commit yet: treat the wiki as un-synced bootstrap and
              # don't block. (range empty => no foreign commits considered)
              foreign_range=""
            fi
            if [ -n "$foreign_range" ]; then
              foreign_commits=$(git log "$foreign_range" \
                --pretty=format:'%ae%x09%h %an <%ae> %s' \
                | awk -F'\t' -v bot="${SYNC_BOT_EMAIL}" '$1 != bot {print $2}')
            else
              foreign_commits=""
            fi

            if [ -n "$foreign_commits" ]; then
              # There are direct edits on top of our last sync. Only block if
              # the live downstream content actually differs from what we'd
              # push; if it already matches, the edits are reconciled and safe.
              if ! diff -r --exclude='.git' "$src" . >/dev/null 2>&1; then
                {
                  echo "::error::Unreconciled wiki edits detected on ${target}."
                  echo "The downstream wiki has commit(s) made after the last sync that"
                  echo "the sync bot did not author, and its content differs from this"
                  echo "repo's wiki/. Syncing now would overwrite that work."
                  echo
                  echo "Direct (non-sync) commits on ${target}.wiki.git:"
                  echo "${foreign_commits}"
                  echo
                  echo "To reconcile: clone ${target}.wiki.git, copy the changed pages/"
                  echo "images into this repo's wiki/ directory, open a PR to v1, then"
                  echo "re-run this workflow. See .github/workflows/mirror-to-public.yaml"
                  echo "for the downstream-only policy."
                } >&2
                echo "::endgroup::"
                return 1
              fi
              echo "Direct commits exist on ${target} but content already matches wiki/; proceeding."
            fi

            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
            rsync -a "$src"/ ./

            if [ -z "$(git status --porcelain)" ]; then
              echo "Wiki on ${target} already up to date."
              echo "::endgroup::"
              return 0
            fi

            git add -A
            git commit -q -m "Sync from ${SOURCE_REPO}@${short}"
            local branch
            branch=$(git symbolic-ref --short HEAD)
            git push origin "$branch"
            echo "::endgroup::"
          }

          sync_wiki "${TARGET_REPO}" "${SYNC_TOKEN}"
          sync_wiki "${SOURCE_REPO}" "${DEV_TOKEN}"
