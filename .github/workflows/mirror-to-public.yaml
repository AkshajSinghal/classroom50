name: Mirror to public repo

on:
  push:
    branches: [v1]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mirror-to-public
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TARGET_REPO: foundation50/classroom50
      TARGET_BRANCH: main
      SOURCE_REPO: ${{ github.repository }}
      SOURCE_SHA: ${{ github.sha }}
      SYNC_TOKEN: ${{ secrets.MIRROR_PAT }}
    steps:
      - name: Check token
        run: |
          if [ -z "${SYNC_TOKEN:-}" ]; then
            echo "::error::MIRROR_PAT secret is missing. Create a PAT with contents+wiki write access on ${TARGET_REPO} and add it as repository secret MIRROR_PAT."
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: Configure git identity
        run: |
          git config --global user.name "classroom50-sync[bot]"
          git config --global user.email "classroom50-sync@users.noreply.github.com"

      - name: Mirror repo content
        run: |
          set -euo pipefail
          work=$(mktemp -d)
          cd "$work"

          remote="https://x-access-token:${SYNC_TOKEN}@github.com/${TARGET_REPO}.git"
          if git clone --quiet "$remote" target; then
            cd target
          else
            mkdir target
            cd target
            git init -q -b "$TARGET_BRANCH"
            git remote add origin "$remote"
          fi

          # Make sure we're on the target branch, even if the remote's default differs
          # or the repo was empty (no HEAD yet).
          if git rev-parse --verify HEAD >/dev/null 2>&1; then
            git checkout -B "$TARGET_BRANCH"
          else
            git checkout -b "$TARGET_BRANCH"
          fi

          # Wipe tracked content (preserve .git), then copy current source tree in.
          # wiki/ is excluded here -- it goes to the wiki repo in the next step.
          # The sync workflow itself is excluded so the public repo doesn't try to
          # run it.
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          rsync -a \
            --exclude='.git/' \
            --exclude='wiki/' \
            --exclude='.github/workflows/mirror-to-public.yaml' \
            "$GITHUB_WORKSPACE"/ ./

          if [ -z "$(git status --porcelain)" ]; then
            echo "Repo already up to date."
          else
            git add -A
            short=$(printf '%s' "$SOURCE_SHA" | cut -c1-7)
            git commit -q \
              -m "Sync from ${SOURCE_REPO}@${short}" \
              -m "Source: https://github.com/${SOURCE_REPO}/commit/${SOURCE_SHA}"
            git push origin "$TARGET_BRANCH"
          fi

      - name: Mirror wiki content
        run: |
          set -euo pipefail
          src="$GITHUB_WORKSPACE/wiki"
          if [ ! -d "$src" ] || [ -z "$(ls -A "$src" 2>/dev/null)" ]; then
            echo "No wiki/ content; skipping wiki sync."
            exit 0
          fi

          work=$(mktemp -d)
          cd "$work"
          remote="https://x-access-token:${SYNC_TOKEN}@github.com/${TARGET_REPO}.wiki.git"
          if ! git clone --quiet "$remote" wiki; then
            echo "::error::Could not clone ${TARGET_REPO}.wiki.git. Enable the wiki on ${TARGET_REPO} and create at least one page (e.g. Home) via the GitHub UI to initialize the wiki repo, then re-run this workflow."
            exit 1
          fi

          cd wiki
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          rsync -a "$src"/ ./

          if [ -z "$(git status --porcelain)" ]; then
            echo "Wiki already up to date."
            exit 0
          fi

          git add -A
          short=$(printf '%s' "$SOURCE_SHA" | cut -c1-7)
          git commit -q -m "Sync from ${SOURCE_REPO}@${short}"
          branch=$(git symbolic-ref --short HEAD)
          git push origin "$branch"
